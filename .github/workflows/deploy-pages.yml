name: deploy-pages

on:
  pull_request:
    branches: [develop, staging]
  push:
    branches: [develop, staging]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build develop preview
        if: github.ref == 'refs/heads/develop' || github.base_ref == 'develop'
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: dev
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Build staging site
        if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: staging
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload preview artifact for develop
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: develop-dist
          path: dist

  deploy-staging:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    needs: quality
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: staging
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
